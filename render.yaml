services:
  - type: web
    name: fish-breeding-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && cd ml_pipeline && python generate_mock_data.py && python train_model.py"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
